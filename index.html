<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jenniva ☺️</title>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #fff0f5, #ffe4e1);
        }

        h1 {
            color: #d63384;
            font-size: 32px;
        }

        #output {
            margin-top: 30px;
            font-size: 20px;
            color: #333;
            white-space: pre-line;
            line-height: 1.6;
            min-height: 200px;
        }

        .heart {
            font-size: 42px;
        }
    </style>
</head>

<body>

    <div class="heart">❤️</div>
    <h1>For Jenniva</h1>

    <div id="output">Loading message... ☺️</div>

    <script>
        async function typeWriter(text, delay = 40) {
            const output = document.getElementById("output");
            output.innerText = "";

            for (let char of text) {
                output.innerText += char;

                if (char !== " " && char !== "\n") {
                    await new Promise(r => setTimeout(r, delay));
                }
            }
        }

        async function greet() {
            const targetDate = "2026-04-12";
            const today = new Date().toISOString().split("T")[0];

            const poem = `Like morning light that softly breaks,
You came into my life awake.
A quiet peace, a gentle grace,
A love I never can replace.

In every smile, in every sigh,
You are my reason, my “good try.”
Through storms or calm, near or far,
You are my constant guiding star.

Jenniva, my heart’s sweet song,
With you is where I belong.
Not just today, but all my days,
I’ll love you in a thousand ways. ☺️❤️

Happy anniversary again my Love,
If I say it in one phrase,
You complete me😌. 
I see your efforts.
I feel your love.
I Pray that we will always have a
Long, Loving, and Peaceful Life together.

"Curious, Are you agnostic? 🤔🤣🤣🤣
I love you so muchhhhh my beautiful and wonderful Love 😌😚🥰🤗.`;

            const specialPoem = `Today the world feels warm and bright,
Because our love stands pure and right.
A journey shared, a bond so true,
And every moment leads to you.

Happy Anniversary, my love Jenniva ❤️
You are my answered prayer.`;

            let message = (today === targetDate)
                ? specialPoem + "\n\n" + poem
                : poem;

            await typeWriter(message, 40);
        }

        greet();
    </script>

</body>
</html>

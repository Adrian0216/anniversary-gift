<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Jenniva ☺️</title>

<style>
    body {
        font-family: sans-serif;
        text-align: center;
        padding: 60px 20px;
        background: linear-gradient(135deg, #fff0f5, #ffe4e1);
    }

    h1 {
        color: #d63384;
        font-size: 32px;
    }

    #output {
        margin-top: 30px;
        font-size: 20px;
        color: #333;
        line-height: 1.8;
        min-height: 200px;
    }

    .line {
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.8s ease;
    }

    .show {
        opacity: 1;
        transform: translateY(0);
    }

    .heart {
        font-size: 42px;
    }
</style>
</head>

<body>

<div class="heart">❤️</div>
<h1>For Jenniva my Love</h1>
<div id="output"></div>

<script>
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function showMessage(text) {
    const output = document.getElementById("output");
    output.innerHTML = "";

    const lines = text.split("\n");

    for (let line of lines) {
        const div = document.createElement("div");
        div.className = "line";
        div.textContent = line;

        output.appendChild(div);

        await sleep(200);
        div.classList.add("show");

        let pause = 1200 + (line.length * 30);
        await sleep(pause);
    }
}

async function greet() {

    // ✅ FIXED: Local timezone-safe date
    const today = new Date().toLocaleDateString("en-CA");
    const targetDate = "2026-04-12";

    const poem = `Like morning light that softly breaks,
You came into my life awake.
A quiet peace, a gentle grace,
A love I never can replace.

In every smile, in every sigh,
You are my reason, my “good try.”
Through storms or calm, near or far,
You are my constant guiding star.

Jenniva, my heart’s sweet song,
With you is where I belong.
Not just today, but all my days,
I’ll love you in a thousand ways. ☺️❤️

Happy anniversary again my Love,
If I say it in one phrase,
You complete me 😌.
I see your efforts.
I feel your love.
I pray that we will always have a
Long, loving, and peaceful life together.

"Curious, are you agnostic? 🤔🤣🤣🤣
I love you so muchhhhh my beautiful and wonderful Love 😌😚🥰.
Have a wonderful and blissful day ahead my beautiful and pretty Lalove🤗.`;

    const specialPoem = `Today the world feels warm and bright,
Because our love stands pure and right.
A journey shared, a bond so true,
And every moment leads to you.

Happy Anniversary, my love Jenniva ❤️
You are my answered prayer.`;

    let message = (today === targetDate)
        ? specialPoem + "\n\n" + poem
        : poem;

    await showMessage(message);
}

greet();
</script>

</body>
</html>
